name: Codex Update

on:
  schedule:
    - cron: '0 5 * * *' 
  workflow_dispatch:

env:
  CODEX_PACKAGE: '@openai/codex'
  CODEX_UPDATE_LABEL: 'codex-update'
  GITHUB_BOT_USERNAME: 'github-actions[bot]'

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_update: ${{ steps.check.outputs.should_update }}
      version: ${{ steps.check.outputs.version }}
      branch: ${{ steps.check.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if update is required
        id: check
        run: |
          if ! npm outdated ${{ env.CODEX_PACKAGE }}; then
            echo "Package is up to date"
            exit 0
          fi

          LATEST=$(npm view ${{ env.CODEX_PACKAGE }} version)
          BRANCH="codex-update/$LATEST"

          if git ls-remote --exit-code --heads origin "refs/heads/$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists"
            exit 0
          fi

          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "should_update=true" >> $GITHUB_OUTPUT

  update:
    needs: check
    if: needs.check.outputs.should_update == 'true'
    runs-on: ubuntu-latest
    env:
      BRANCH: ${{ needs.check.outputs.branch }}
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git user and prepare branch
        run: |
          git config user.name "${{ env.GITHUB_BOT_USERNAME }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ env.BRANCH }}"

      - name: Install new version of package and commit
        run: |
          npm install ${{ env.CODEX_PACKAGE }}@${{ env.VERSION }}
          npm run generate-types
          git add package.json package-lock.json src/app-server
          git commit -m "Update codex to ${{ env.VERSION }}"
          git push origin "${{ env.BRANCH }}"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --base main \
            --title "Update codex to ${{ env.VERSION }}" \
            --body "[What's new](https://github.com/openai/codex/releases/tag/rust-v${{ env.VERSION }})" \
            --label "${{ env.CODEX_UPDATE_LABEL }}"

      - name: Close obsolete PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          git fetch origin main

          gh pr list \
            --state open \
            --label "${{ env.CODEX_UPDATE_LABEL }}" \
            --json number,headRefName \
            --jq '.[] | [.number, .headRefName] | @tsv' |
          while IFS=$'\t' read -r pr_number head_ref; do
            if [[ "$head_ref" == "${{ env.BRANCH }}" || "$head_ref" != codex-update/* ]]; then
              continue
            fi

            git fetch origin "refs/heads/${head_ref}:refs/remotes/origin/${head_ref}"

            # If there are any non-bot commits, don't close the PR
            if git log --format='%cn' "origin/main..origin/${head_ref}" | grep -Fvxq "${{ env.GITHUB_BOT_USERNAME }}"; then
              continue
            fi

            gh pr close "$pr_number" \
              --comment "Closing obsolete update PR"
          done
