name: Codex Update

on:
  schedule:
    - cron: '0 9 * * *'
  push:
    branches:
      - ish/codex-autoupdate
  workflow_dispatch:

env:
  CODEX_PACKAGE: '@openai/codex'

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if update is required
        id: check
        run: |
          if ! npm outdated ${{ env.CODEX_PACKAGE }}; then
            echo "Package is up to date"
            exit 0
          fi

          LATEST=$(npm view ${{ env.CODEX_PACKAGE }} version)
          BRANCH="codex-update/$LATEST"

          if git ls-remote --exit-code --heads origin "refs/heads/$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists"
            exit 0
          fi

          echo "VERSION=$LATEST" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "should_update=true" >> $GITHUB_OUTPUT

      - name: Try to update and create PR
        if: steps.check.outputs.should_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${{ env.BRANCH }}"
          npm install ${{ env.CODEX_PACKAGE }}@${{ env.VERSION }}
          git add package.json package-lock.json
          git commit -m "Update codex to ${{ env.VERSION }}"
          git push origin "${{ env.BRANCH }}"

          gh pr create --title "Update codex to ${{ env.VERSION }}"
